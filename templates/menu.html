<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUZZ - المنيو</title>
    <meta name="description" content="SUZZ - أول Drive-Thru في السويس">
    
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/6JTrCJGK/IMG-5877.jpg">
    
    <!-- Open Graph -->
    <meta property="og:title" content="SUZZ - المنيو">
    <meta property="og:description" content="SUZZ - أول Drive-Thru في السويس">
    <meta property="og:image" content="https://i.ibb.co/MDHwvrfG/IMG-5849.jpg">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    

    
    <!-- Modern Design System -->
    <link rel="stylesheet" href="/static/css/modern-design.css">
    
    <!-- Menu Mobile Enhancements -->
    <link rel="stylesheet" href="/static/css/menu-mobile.css">
    
    <!-- General Mobile Menu Improvements -->
    <link rel="stylesheet" href="/static/css/mobile-menu-general.css">
</head>
<body class="menu-page">
    <!-- Header -->
    <header class="header" id="header">
        <div class="container">
            <div class="header-content">
                <!-- Logo Section -->
                <div class="logo-section">
                    <img src="https://i.ibb.co/6JTrCJGK/IMG-5877.jpg" alt="SUZZ Logo" class="logo-image">
                    <div class="logo-text">
                        <h1>SUZZ</h1>
                        <p>🏆 أول Drive-Thru في السويس</p>
                    </div>
                </div>

                <!-- Desktop Navigation -->
                <nav class="desktop-nav">
                    <a href="/home" class="desktop-nav-link">الرئيسية</a>
                    <a href="/menu" class="desktop-nav-link active">المنيو</a>
                    <a href="/location" class="desktop-nav-link">الموقع</a>
                    <a href="/order" class="desktop-nav-link">اطلب الآن</a>
                    <a href="/contact" class="desktop-nav-link">تواصل معنا</a>
                    <a href="/" class="desktop-nav-link">كود الخصم</a>
                </nav>

                <!-- Header Controls -->
                <div class="header-controls">
                    <button class="control-btn theme-toggle" onclick="toggleTheme()" aria-label="تغيير المظهر">
                        <i class="fas fa-moon" id="theme-icon"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Bottom Navigation (Mobile) - المنيو بار الرسمي -->
    <nav class="bottom-nav md:hidden" id="bottom-nav">
        <a href="/home" class="bottom-nav-item">
            <i class="nav-icon fas fa-home"></i>
            <span class="nav-label">الرئيسية</span>
        </a>
        <a href="/menu" class="bottom-nav-item active">
            <i class="nav-icon fas fa-book-open"></i>
            <span class="nav-label">المنيو</span>
        </a>
        <a href="/order" class="bottom-nav-item">
            <i class="nav-icon fas fa-shopping-cart"></i>
            <span class="nav-label">اطلب</span>
        </a>
        <a href="/location" class="bottom-nav-item">
            <i class="nav-icon fas fa-map-marker-alt"></i>
            <span class="nav-label">الموقع</span>
        </a>
        <a href="/" class="bottom-nav-item">
            <i class="nav-icon fas fa-qrcode"></i>
            <span class="nav-label">خصم</span>
        </a>
    </nav>

    <!-- Desktop Menu Section -->
    <section class="menu-section desktop-menu">
        <div class="menu-grid">
            <div class="menu-item" onclick="openMenuViewer('/static/images/menu/menu photo 1.jpg', '/static/images/menu/menu photo 2.jpg', 0)">
                <img src="/static/images/menu/menu photo 1.jpg" alt="Menu 1" class="menu-image">
                <div class="menu-overlay">
                    <p class="menu-text">اضغط لرؤية المنيو</p>
                </div>
            </div>
            
            <div class="menu-item" onclick="openMenuViewer('/static/images/menu/menu photo 1.jpg', '/static/images/menu/menu photo 2.jpg', 1)">
                <img src="/static/images/menu/menu photo 2.jpg" alt="Menu 2" class="menu-image">
                <div class="menu-overlay">
                    <p class="menu-text">اضغط لرؤية المنيو</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Mobile Menu Section -->
    <section class="mobile-menu-section">
        <!-- Download Menu Button - Above Menu -->
        <div class="download-menu-section">
            <button class="download-menu-btn" onclick="downloadMenu()">
                <i class="fas fa-download"></i>
                تحميل منيو SUZZ كامل (صورتين)
            </button>
        </div>
        
        <div class="mobile-menu-container">
            <div class="mobile-menu-slider">
                <div class="mobile-menu-slide active" data-index="0">
                    <img src="/static/images/menu/menu photo 1.jpg" alt="Menu 1" class="mobile-menu-image">
                </div>
                <div class="mobile-menu-slide" data-index="1">
                    <img src="/static/images/menu/menu photo 2.jpg" alt="Menu 2" class="mobile-menu-image">
                </div>
            </div>
            
            <div class="mobile-menu-indicator">
                <span>1</span> من <span>2</span>
            </div>
        </div>
    </section>

    <!-- Menu Viewer Modal -->
    <div id="menuViewer" class="menu-viewer">
        <div class="menu-viewer-content">
            <button class="menu-viewer-close" onclick="closeMenuViewer()">
                <i class="fas fa-times"></i>
            </button>
            
            <div class="menu-viewer-image-container">
                <img id="viewerImage" src="" alt="Menu" class="viewer-image">
            </div>
            
            <div class="menu-viewer-thumbnails">
                <div class="thumbnail-container">
                    <img src="/static/images/menu/menu photo 1.jpg" alt="Menu 1" class="thumbnail" data-index="0" onclick="goToImage(0)">
                    <span class="thumbnail-number">1</span>
                </div>
                <div class="thumbnail-container">
                    <img src="/static/images/menu/menu photo 2.jpg" alt="Menu 2" class="thumbnail" data-index="1" onclick="goToImage(1)">
                    <span class="thumbnail-number">2</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Theme Management
        function initializeTheme() {
            const savedTheme = localStorage.getItem('suzz-theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('suzz-theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.className = theme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
            }
        }

        // Header Scroll Effect
        function handleHeaderScroll() {
            const header = document.getElementById('header');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        }

        // Mobile Menu Functions
        let currentMobileSlide = 0;
        const mobileSlides = document.querySelectorAll('.mobile-menu-slide');
        const mobileIndicators = document.querySelectorAll('.mobile-indicator');
        let isZoomed = false;
        let currentScale = 1;
        let startDistance = 0;
        let startScale = 1;

        function showMobileSlide(index) {
            // Hide all slides
            mobileSlides.forEach(slide => slide.classList.remove('active'));
            mobileIndicators.forEach(indicator => indicator.classList.remove('active'));
            
            // Show current slide
            mobileSlides[index].classList.add('active');
            mobileIndicators[index].classList.add('active');
            
            currentMobileSlide = index;
            
            // Reset zoom when changing slides
            resetZoom();
        }

        function nextMobileSlide() {
            const nextIndex = (currentMobileSlide + 1) % mobileSlides.length;
            showMobileSlide(nextIndex);
        }

        function previousMobileSlide() {
            const prevIndex = (currentMobileSlide - 1 + mobileSlides.length) % mobileSlides.length;
            showMobileSlide(prevIndex);
        }

        function resetZoom() {
            isZoomed = false;
            currentScale = 1;
            const activeSlide = document.querySelector('.mobile-menu-slide.active');
            if (activeSlide) {
                const image = activeSlide.querySelector('.mobile-menu-image');
                if (image) {
                    image.style.transform = 'scale(1)';
                    image.classList.remove('zoomed');
                }
            }
        }

        // Touch support for mobile swipe and zoom
        let startX = 0;
        let startY = 0;
        let isSwiping = false;
        let touchStartTime = 0;

        document.addEventListener('touchstart', function(e) {
            if (document.querySelector('.mobile-menu-container')) {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                touchStartTime = Date.now();
                
                // Handle pinch to zoom
                if (e.touches.length === 2) {
                    e.preventDefault();
                    startDistance = Math.sqrt(
                        Math.pow(e.touches[0].clientX - e.touches[1].clientX, 2) +
                        Math.pow(e.touches[0].clientY - e.touches[1].clientY, 2)
                    );
                    startScale = currentScale;
                }
            }
        });

        document.addEventListener('touchmove', function(e) {
            if (document.querySelector('.mobile-menu-container')) {
                if (e.touches.length === 2) {
                    // Pinch to zoom
                    e.preventDefault();
                    const currentDistance = Math.sqrt(
                        Math.pow(e.touches[0].clientX - e.touches[1].clientX, 2) +
                        Math.pow(e.touches[0].clientY - e.touches[1].clientY, 2)
                    );
                    
                    const scale = (currentDistance / startDistance) * startScale;
                    currentScale = Math.min(Math.max(scale, 1), 3); // Limit zoom between 1x and 3x
                    
                    const activeSlide = document.querySelector('.mobile-menu-slide.active');
                    if (activeSlide) {
                        const image = activeSlide.querySelector('.mobile-menu-image');
                        if (image) {
                            image.style.transform = `scale(${currentScale})`;
                            isZoomed = currentScale > 1;
                            if (isZoomed) {
                                image.classList.add('zoomed');
                            } else {
                                image.classList.remove('zoomed');
                            }
                        }
                    }
                } else if (e.touches.length === 1 && !isZoomed) {
                    // Single touch swipe for navigation
                    const currentX = e.touches[0].clientX;
                    const currentY = e.touches[0].clientY;
                    const diffX = Math.abs(currentX - startX);
                    const diffY = Math.abs(currentY - startY);
                    
                    if (diffX > 10 && diffX > diffY) {
                        isSwiping = true;
                        e.preventDefault();
                    }
                }
            }
        });

        document.addEventListener('touchend', function(e) {
            if (document.querySelector('.mobile-menu-container')) {
                const touchEndTime = Date.now();
                const touchDuration = touchEndTime - touchStartTime;
                
                if (e.touches.length === 0 && isSwiping && !isZoomed && touchDuration < 500) {
                    // Handle swipe navigation
                    const endX = e.changedTouches[0].clientX;
                    const endY = e.changedTouches[0].clientY;
                    const diffX = startX - endX;
                    const diffY = startY - endY;

                    if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                        if (diffX > 0) {
                            nextMobileSlide();
                        } else {
                            previousMobileSlide();
                        }
                    }
                }
                
                isSwiping = false;
            }
        });

        // Double tap to zoom
        let lastTap = 0;
        document.addEventListener('touchend', function(e) {
            if (document.querySelector('.mobile-menu-container')) {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap;
                
                if (tapLength < 300 && tapLength > 0) {
                    // Double tap detected
                    const activeSlide = document.querySelector('.mobile-menu-slide.active');
                    if (activeSlide) {
                        const image = activeSlide.querySelector('.mobile-menu-image');
                        if (image) {
                            if (isZoomed) {
                                resetZoom();
                            } else {
                                currentScale = 2;
                                isZoomed = true;
                                image.style.transform = 'scale(2)';
                                image.classList.add('zoomed');
                            }
                        }
                    }
                    e.preventDefault();
                }
                
                lastTap = currentTime;
            }
        });

        // Menu Viewer Functions
        let currentImages = [];
        let currentImageIndex = 0;
        let isViewerZoomed = false;
        let viewerScale = 1;
        let startViewerDistance = 0;
        let startViewerScale = 1;
        let startViewerX = 0;
        let startViewerY = 0;
        let viewerTranslateX = 0;
        let viewerTranslateY = 0;

        function openMenuViewer(imageSrc1, imageSrc2, startIndex = 0) {
            const viewer = document.getElementById('menuViewer');
            const viewerImage = document.getElementById('viewerImage');
            
            // Always set both images for navigation
            currentImages = ['/static/images/menu/menu photo 1.jpg', '/static/images/menu/menu photo 2.jpg'];
            currentImageIndex = startIndex;
            viewerImage.src = currentImages[currentImageIndex];
            
            console.log('Menu viewer opened with images:', currentImages);
            console.log('Starting with image index:', currentImageIndex);
            
            // Reset zoom and position
            resetViewerZoom();
            updateThumbnailActive();
            viewer.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function openFullScreenImage(imageSrc) {
            const viewer = document.getElementById('menuViewer');
            const viewerImage = document.getElementById('viewerImage');
            
            // Always set both images for navigation
            currentImages = ['/static/images/menu/menu photo 1.jpg', '/static/images/menu/menu photo 2.jpg'];
            
            // Find which image was clicked and set it as current
            if (imageSrc.includes('menu photo 1')) {
                currentImageIndex = 0;
            } else if (imageSrc.includes('menu photo 2')) {
                currentImageIndex = 1;
            } else {
                currentImageIndex = 0;
            }
            
            viewerImage.src = currentImages[currentImageIndex];
            
            console.log('Full screen opened with images:', currentImages);
            console.log('Starting with image index:', currentImageIndex);
            
            // Reset zoom and position
            resetViewerZoom();
            updateThumbnailActive();
            viewer.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeMenuViewer() {
            const viewer = document.getElementById('menuViewer');
            viewer.classList.remove('show');
            document.body.style.overflow = 'auto';
        }

        function toggleFullScreen() {
            const viewerImage = document.getElementById('viewerImage');
            if (!isFullScreen) {
                // Enter full screen mode
                isFullScreen = true;
                viewerImage.style.objectFit = 'cover';
                viewerImage.style.width = '100vw';
                viewerImage.style.height = '100vh';
                viewerImage.style.borderRadius = '0';
                console.log('Entered full screen mode');
            } else {
                // Exit full screen mode
                isFullScreen = false;
                viewerImage.style.objectFit = 'contain';
                viewerImage.style.width = '100%';
                viewerImage.style.height = '100%';
                viewerImage.style.borderRadius = '16px';
                console.log('Exited full screen mode');
            }
        }

        function previousImage() {
            console.log('Previous image clicked');
            console.log('Current images array:', currentImages);
            console.log('Current index before:', currentImageIndex);
            
            if (currentImages.length > 1) {
                currentImageIndex = (currentImageIndex - 1 + currentImages.length) % currentImages.length;
                const viewerImage = document.getElementById('viewerImage');
                viewerImage.src = currentImages[currentImageIndex];
                
                console.log('Switched to image:', currentImageIndex);
                console.log('New image src:', currentImages[currentImageIndex]);
                
                resetViewerZoom();
                updateThumbnailActive();
            } else {
                console.log('Only one image available, cannot navigate');
            }
        }

        function nextImage() {
            console.log('Next image clicked');
            console.log('Current images array:', currentImages);
            console.log('Current index before:', currentImageIndex);
            
            if (currentImages.length > 1) {
                currentImageIndex = (currentImageIndex + 1) % currentImages.length;
                const viewerImage = document.getElementById('viewerImage');
                viewerImage.src = currentImages[currentImageIndex];
                
                console.log('Switched to image:', currentImageIndex);
                console.log('New image src:', currentImages[currentImageIndex]);
                
                resetViewerZoom();
                updateThumbnailActive();
            } else {
                console.log('Only one image available, cannot navigate');
            }
        }

        function goToImage(index) {
            console.log('Go to image clicked, index:', index);
            console.log('Current images array:', currentImages);
            
            if (index >= 0 && index < currentImages.length) {
                currentImageIndex = index;
                const viewerImage = document.getElementById('viewerImage');
                viewerImage.src = currentImages[currentImageIndex];
                
                console.log('Went to image:', currentImageIndex);
                console.log('New image src:', currentImages[currentImageIndex]);
                
                resetViewerZoom();
                updateThumbnailActive();
            } else {
                console.log('Invalid index:', index);
            }
        }

        function resetViewerZoom() {
            isViewerZoomed = false;
            viewerScale = 1;
            viewerTranslateX = 0;
            viewerTranslateY = 0;
            const viewerImage = document.getElementById('viewerImage');
            if (viewerImage) {
                viewerImage.style.transform = 'scale(1) translate(0px, 0px)';
            }
        }

        function updateThumbnailActive() {
            const thumbnails = document.querySelectorAll('.thumbnail-container');
            
            console.log('Updating thumbnails, currentIndex:', currentImageIndex);
            console.log('Total images:', currentImages.length);
            
            thumbnails.forEach((thumb, index) => {
                if (index === currentImageIndex) {
                    thumb.classList.add('active');
                    console.log('Thumbnail', index, 'set to active');
                } else {
                    thumb.classList.remove('active');
                    console.log('Thumbnail', index, 'set to inactive');
                }
            });
        }

        // Download menu function
        function downloadMenu() {
            // Download images individually for better mobile compatibility
            downloadImagesIndividually();
        }

        // Fallback function to download images individually
        function downloadImagesIndividually() {
            // Download first image
            const link1 = document.createElement('a');
            link1.href = '/static/images/menu/menu photo 1.jpg';
            link1.download = 'suzz-menu-drinks.jpg';
            document.body.appendChild(link1);
            link1.click();
            document.body.removeChild(link1);
            
            // Download second image after a short delay
            setTimeout(() => {
                const link2 = document.createElement('a');
                link2.href = '/static/images/menu/menu photo 2.jpg';
                link2.download = 'suzz-menu-food.jpg';
                document.body.appendChild(link2);
                link2.click();
                document.body.removeChild(link2);
            }, 500);
        }

        // Viewer touch events for zoom and pan
        let viewerStartX = 0;
        let viewerStartY = 0;
        let isViewerSwiping = false;

        document.addEventListener('touchstart', function(e) {
            if (document.getElementById('menuViewer').classList.contains('show')) {
                viewerStartX = e.touches[0].clientX;
                viewerStartY = e.touches[0].clientY;
                
                if (e.touches.length === 2) {
                    // Pinch to zoom
                    e.preventDefault();
                    startViewerDistance = Math.sqrt(
                        Math.pow(e.touches[0].clientX - e.touches[1].clientX, 2) +
                        Math.pow(e.touches[0].clientY - e.touches[1].clientY, 2)
                    );
                    startViewerScale = viewerScale;
                } else if (e.touches.length === 1 && isViewerZoomed) {
                    // Single touch for panning when zoomed
                    startViewerX = e.touches[0].clientX - viewerTranslateX;
                    startViewerY = e.touches[0].clientY - viewerTranslateY;
                }
            }
        });

        document.addEventListener('touchmove', function(e) {
            if (document.getElementById('menuViewer').classList.contains('show')) {
                if (e.touches.length === 2) {
                    // Pinch to zoom
                    e.preventDefault();
                    const currentDistance = Math.sqrt(
                        Math.pow(e.touches[0].clientX - e.touches[1].clientX, 2) +
                        Math.pow(e.touches[0].clientY - e.touches[1].clientY, 2)
                    );
                    
                    const scale = (currentDistance / startViewerDistance) * startViewerScale;
                    viewerScale = Math.min(Math.max(scale, 1), 4); // Limit zoom between 1x and 3x
                    isViewerZoomed = viewerScale > 1;
                    
                    const viewerImage = document.getElementById('viewerImage');
                    if (viewerImage) {
                        viewerImage.style.transform = `scale(${viewerScale}) translate(${viewerTranslateX}px, ${viewerTranslateY}px)`;
                    }
                } else if (e.touches.length === 1 && isViewerZoomed) {
                    // Panning when zoomed
                    e.preventDefault();
                    viewerTranslateX = e.touches[0].clientX - startViewerX;
                    viewerTranslateY = e.touches[0].clientY - startViewerY;
                    
                    const viewerImage = document.getElementById('viewerImage');
                    if (viewerImage) {
                        viewerImage.style.transform = `scale(${viewerScale}) translate(${viewerTranslateX}px, ${viewerTranslateY}px)`;
                    }
                } else if (e.touches.length === 1 && !isViewerZoomed) {
                    // Swipe for navigation when not zoomed
                    const currentX = e.touches[0].clientX;
                    const currentY = e.touches[0].clientY;
                    const diffX = Math.abs(currentX - viewerStartX);
                    const diffY = Math.abs(currentY - viewerStartY);
                    
                    if (diffX > 10 && diffX > diffY) {
                        isViewerSwiping = true;
                        e.preventDefault();
                    }
                }
            }
        });

        document.addEventListener('touchend', function(e) {
            if (document.getElementById('menuViewer').classList.contains('show')) {
                if (e.touches.length === 0 && isViewerSwiping && !isViewerZoomed && currentImages.length > 1) {
                    // Handle swipe navigation
                    const endX = e.changedTouches[0].clientX;
                    const endY = e.changedTouches[0].clientY;
                    const diffX = viewerStartX - endX;
                    const diffY = viewerStartY - endY;

                    if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                        if (diffX > 0) {
                            nextImage();
                        } else {
                            previousImage();
                        }
                    }
                }
                
                isViewerSwiping = false;
            }
        });

        // Double tap to zoom in viewer
        let lastViewerTap = 0;
        document.addEventListener('touchend', function(e) {
            if (document.getElementById('menuViewer').classList.contains('show')) {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastViewerTap;
                
                if (tapLength < 300 && tapLength > 0) {
                    // Double tap detected
                    const viewerImage = document.getElementById('viewerImage');
                    if (viewerImage) {
                        if (isViewerZoomed) {
                            resetViewerZoom();
                        } else {
                            viewerScale = 2;
                            isViewerZoomed = true;
                            viewerImage.style.transform = 'scale(2)';
                        }
                    }
                    e.preventDefault();
                }
                
                lastViewerTap = currentTime;
            }
        });

        // Close viewer when clicking outside
        document.getElementById('menuViewer').addEventListener('click', function(e) {
            if (e.target === this) {
                closeMenuViewer();
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(event) {
            if (document.getElementById('menuViewer').classList.contains('show')) {
                if (event.key === 'ArrowLeft') {
                    previousImage();
                } else if (event.key === 'ArrowRight') {
                    nextImage();
                } else if (event.key === 'Escape') {
                    closeMenuViewer();
                }
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initializeTheme();
            window.addEventListener('scroll', handleHeaderScroll);
            
            // Initialize mobile indicators
            mobileIndicators.forEach((indicator, index) => {
                indicator.addEventListener('click', () => showMobileSlide(index));
            });

            // Add click event to mobile images
            mobileSlides.forEach(slide => {
                const image = slide.querySelector('.mobile-menu-image');
                if (image) {
                    image.addEventListener('click', function() {
                        openFullScreenImage(this.src);
                    });
                }
            });

            // Test navigation buttons
            console.log('Page loaded, testing navigation...');
